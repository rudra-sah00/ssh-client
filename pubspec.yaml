name: ssh_client
description: "A production-ready Flutter SSH client."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Core SSH
  dartssh2: ^2.17.1

  # Terminal UI
  xterm: ^4.0.0

  # State Management
  flutter_riverpod: ^2.5.0

  # UI / Aesthetic
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0
  flex_color_scheme: ^8.4.0

  # Security
  flutter_secure_storage: ^9.0.0

  # Models / Utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  freezed: ^2.5.2
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
